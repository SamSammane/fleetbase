<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 812 137">
  <defs>
    <style>
      .ifs-green { fill: #1D4A3A; }
      .ifs-grey { fill: #A5A7AA; }
      .ring-green { stroke: #1D4A3A; }
      .ring-grey { stroke: #A5A7AA; }
      .ring { fill: none; stroke-width: 17; }
      .word { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; }
    </style>
  </defs>
  <!-- Circular segmented badge (client IFS mark) -->
  <g transform="translate(68.5,68.5)">
    <!-- top segment: green -->
    <path class="ring ring-green" d="M -40.3 -33.8 A 52.5 52.5 0 0 1 40.3 -33.8" stroke-linecap="butt"/>
    <!-- right segment: grey -->
    <path class="ring ring-grey" d="M 44.9 -27.2 A 52.5 52.5 0 0 1 44.9 27.2" stroke-linecap="butt"/>
    <!-- bottom segment: green -->
    <path class="ring ring-green" d="M 40.3 33.8 A 52.5 52.5 0 0 1 -40.3 33.8" stroke-linecap="butt"/>
    <!-- left segment: grey -->
    <path class="ring ring-grey" d="M -44.9 27.2 A 52.5 52.5 0 0 1 -44.9 -27.2" stroke-linecap="butt"/>
    <circle r="38" fill="#ffffff" stroke="#1D4A3A" stroke-width="2.5"/>
    <text class="ifs-green word" x="0" y="12" font-size="34" text-anchor="middle" font-weight="800">IFS</text>
  </g>
  <!-- Divider -->
  <rect x="150" y="18" width="3" height="101" fill="#1D4A3A"/>
  <!-- Wordmark -->
  <text class="ifs-green word" x="172" y="48" font-size="38">Integrated</text>
  <text class="ifs-green word" x="172" y="86" font-size="38">Fleet Solutions</text>
  <text class="ifs-grey word" x="172" y="122" font-size="30" letter-spacing="2">IFS</text>
</svg>
